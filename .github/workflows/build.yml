name: Build Modern Android APK

      - name: Install Yarn
        run: npm install -g yarn

      - name: Clean Previous Dependencies
        run: |
          rm -rf node_modules
          rm -rf android/.gradle

      - name: Install Dependencies
        run: yarn install --network-timeout 100000

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      - name: Update Gradle Wrapper
        run: |
          cd android
          sed -i 's/gradle-.*-all.zip/gradle-8.7-bin.zip/g' gradle/wrapper/gradle-wrapper.properties || true

      - name: Enable AndroidX
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Set SDK Versions
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle || true
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle || true

      - name: Clean Gradle
        run: |
          cd android
          ./gradlew clean

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: List APK Files
        run: |
          find android -name "*.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/reports
            android/build/reports
